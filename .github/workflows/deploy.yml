name: .NET CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:

    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Restore dependencies
    - name: Restore dependencies
      run: dotnet restore

    # Build project
    - name: Build project
      run: dotnet build --configuration Release --no-restore

    # Publish project
    - name: Publish project
      run: dotnet publish -c Release -o publish

    # Ensure IIS folder exists
    - name: Ensure IIS Folder Exists
      shell: powershell
      run: |
        if (!(Test-Path "C:\inetpub\wwwroot\SalesDashboardAPI")) {
            New-Item -ItemType Directory -Path "C:\inetpub\wwwroot\SalesDashboardAPI"
        }

    # Clean IIS folder
    - name: Clean IIS Folder
      shell: powershell
      run: |
        if (Test-Path "C:\inetpub\wwwroot\SalesDashboardAPI") {
            Get-ChildItem "C:\inetpub\wwwroot\SalesDashboardAPI" -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
        }

    # Copy files to IIS
    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesDashboardAPI" -Recurse -Force

    # Restart IIS Site (NO ADMIN NEEDED)
    - name: Restart IIS Site
      shell: powershell
      run: |
        Import-Module WebAdministration
        if (Get-Website -Name "SalesDashboardAPI" -ErrorAction SilentlyContinue) {
            Stop-WebSite -Name "SalesDashboardAPI"
            Start-WebSite -Name "SalesDashboardAPI"
        }
