name: .NET CI/CD

on:
  push:
    branches:
      - main   # ⚠️ tumhara branch main hai

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish -c Release -o publish

    # ✅ Enable maintenance mode (locks IIS safely)
    - name: Enable app_offline
      shell: powershell
      run: |
        if (!(Test-Path "C:\inetpub\wwwroot\SalesDashboardAPI")) {
            New-Item -ItemType Directory -Path "C:\inetpub\wwwroot\SalesDashboardAPI"
        }
        New-Item "C:\inetpub\wwwroot\SalesDashboardAPI\app_offline.htm" -ItemType File -Force

    # ✅ Clean folder safely
    - name: Clean IIS Folder
      shell: powershell
      run: |
        Get-ChildItem "C:\inetpub\wwwroot\SalesDashboardAPI" -Recurse -Exclude "app_offline.htm" | 
        Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

    # ✅ Copy new build
    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesDashboardAPI" -Recurse -Force

    # ✅ Disable maintenance mode
    - name: Disable app_offline
      shell: powershell
      run: |
        Remove-Item "C:\inetpub\wwwroot\SalesDashboardAPI\app_offline.htm" -Force
