name: Deploy ASP.NET Core to IIS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Publish
      run: dotnet publish -c Release -o publish

    - name: Deploy to IIS
      run: |
        xcopy /E /I /Y publish\* C:\inetpub\wwwroot\SalesDashboardAPI\

    - name: Restart IIS
      run: iisreset
